<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="スクショメモ">
  <title>スクショメモ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #c8f03c;
      --accent2: #3cf0c8;
      --text: #f0f0f0;
      --text-muted: #888;
      --danger: #f03c3c;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 17px; font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text-muted); font-weight: 400; }
    .header-actions { display: flex; gap: 8px; }

    /* ── Buttons ── */
    .btn {
      border: none; cursor: pointer; border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s ease;
      padding: 8px 14px;
    }
    .btn:active { transform: scale(0.95); }
    .btn-accent { background: var(--accent); color: #0f0f0f; }
    .btn-accent:hover { background: #d4f548; }
    .btn-ghost { background: var(--surface2); color: var(--text); }
    .btn-ghost:hover { background: var(--border); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-icon {
      width: 36px; height: 36px; padding: 0;
      background: var(--surface2); color: var(--text);
      border-radius: 8px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .btn-icon:active { transform: scale(0.9); }
    .btn-icon:hover { background: var(--border); }

    /* ── Search & Filter ── */
    .toolbar {
      padding: 12px 16px;
      display: flex; gap: 10px; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .search-wrap {
      flex: 1; position: relative;
    }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    input[type="search"], input[type="text"], textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="search"]:focus, input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }
    input[type="search"] {
      width: 100%; padding: 8px 12px 8px 34px;
    }
    .tag-scroll {
      padding: 8px 16px;
      display: flex; gap: 8px; overflow-x: auto;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .tag-scroll::-webkit-scrollbar { display: none; }
    .tag-chip {
      white-space: nowrap; padding: 4px 12px;
      border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s;
    }
    .tag-chip.active {
      background: var(--accent); color: #0f0f0f;
      border-color: var(--accent);
    }

    /* ── Memo Grid ── */
    .memo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 16px;
    }
    .memo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }
    .memo-card:active { transform: scale(0.97); }
    .memo-card:hover { border-color: #444; }
    .memo-card img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; display: block;
    }
    .memo-card-body { padding: 10px; }
    .memo-card-title {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .memo-card-date { font-size: 11px; color: var(--text-muted); }
    .memo-card-tags {
      display: flex; gap: 4px; flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag-badge {
      font-size: 10px; padding: 2px 7px;
      border-radius: 10px;
      background: var(--surface2);
      color: var(--accent2);
      border: 1px solid rgba(60,240,200,0.2);
    }
    .memo-card-no-img {
      aspect-ratio: 4/3;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 13px; line-height: 1.7; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 24px; right: 20px; z-index: 200;
      width: 56px; height: 56px;
      border-radius: 50%; border: none;
      background: var(--accent); color: #0f0f0f;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(200,240,60,0.4);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:active { transform: scale(0.9); }
    .fab:hover { box-shadow: 0 6px 28px rgba(200,240,60,0.6); }

    /* ── Modal base ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      width: 100%; max-height: 92dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 12px auto 0;
    }
    .modal-header {
      padding: 16px 20px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 17px; font-weight: 700; }
    .modal-body { padding: 16px 20px 20px; }

    /* ── Add/Edit form ── */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block; font-weight: 500; }
    textarea {
      width: 100%; padding: 10px 12px;
      resize: none; min-height: 80px; line-height: 1.6;
    }
    input[type="text"] { width: 100%; padding: 9px 12px; }

    /* camera / image picker */
    .img-options {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: 4px;
    }
    .img-option-btn {
      background: var(--surface2); border: 1px dashed var(--border);
      border-radius: var(--radius); color: var(--text);
      padding: 20px 10px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
      transition: border-color 0.2s, background 0.2s;
    }
    .img-option-btn:hover { border-color: var(--accent); background: rgba(200,240,60,0.05); }
    .img-option-btn svg { color: var(--accent); }

    .preview-wrap { position: relative; margin-top: 10px; }
    .preview-wrap img {
      width: 100%; border-radius: var(--radius);
      border: 1px solid var(--border); display: block;
    }
    .preview-remove {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.7); border: none; border-radius: 50%;
      width: 28px; height: 28px; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* tag input */
    .tag-input-wrap {
      display: flex; gap: 8px;
    }
    .tag-input-wrap input { flex: 1; }
    .tags-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag-item {
      background: var(--surface2); border: 1px solid rgba(60,240,200,0.25);
      border-radius: 20px; padding: 3px 10px;
      font-size: 12px; color: var(--accent2);
      display: flex; align-items: center; gap: 5px;
    }
    .tag-item button {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 14px; line-height: 1; padding: 0;
    }

    /* ── Detail modal ── */
    .detail-img { width: 100%; border-radius: var(--radius); display: block; margin-bottom: 16px; }
    .detail-text {
      font-size: 14px; line-height: 1.8;
      color: var(--text); white-space: pre-wrap;
      background: var(--surface2); border-radius: var(--radius);
      padding: 12px; border: 1px solid var(--border);
    }
    .detail-meta { font-size: 11px; color: var(--text-muted); margin: 10px 0; }
    .detail-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: 30px;
      font-size: 13px; z-index: 500;
      opacity: 0; transition: all 0.3s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* hidden file inputs */
    #cameraInput, #galleryInput { display: none; }

    /* ── Confirm dialog ── */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; width: 86%; max-width: 320px;
      text-align: center;
    }
    .confirm-box h3 { font-size: 16px; margin-bottom: 8px; }
    .confirm-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-actions .btn { flex: 1; justify-content: center; }
  </style>
</head>
<body>

<header>
  <div class="logo">スクショ<span>メモ</span></div>
  <div class="header-actions">
    <button class="btn-icon" id="sortBtn" title="並び替え">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
    </button>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="searchInput" placeholder="メモを検索...">
  </div>
</div>

<div class="tag-scroll" id="tagFilter">
  <div class="tag-chip active" data-tag="all">すべて</div>
</div>

<main id="memoGrid" class="memo-grid"></main>

<button class="fab" id="addBtn">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="addModalTitle">新しいメモ</span>
      <button class="btn-icon" id="addModalClose">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">📷 画像</label>
        <div class="img-options" id="imgOptions">
          <button class="img-option-btn" id="cameraBtn">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            カメラで撮影
          </button>
          <button class="img-option-btn" id="galleryBtn">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            ファイルを選択
          </button>
        </div>
        <div class="preview-wrap" id="previewWrap" style="display:none">
          <img id="previewImg" src="" alt="preview">
          <button class="preview-remove" id="removeImg">✕</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">📝 タイトル</label>
        <input type="text" id="memoTitle" placeholder="タイトル（任意）">
      </div>

      <div class="form-group">
        <label class="form-label">💬 メモ</label>
        <textarea id="memoText" placeholder="メモを入力..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">🏷️ タグ</label>
        <div class="tag-input-wrap">
          <input type="text" id="tagInput" placeholder="タグを入力してEnter">
          <button class="btn btn-ghost" id="tagAddBtn">追加</button>
        </div>
        <div class="tags-list" id="tagsList"></div>
      </div>

      <button class="btn btn-accent" id="saveMemoBtn" style="width:100%;justify-content:center;padding:12px;">
        💾 保存する
      </button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">メモの詳細</span>
      <button class="btn-icon" id="detailClose">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <img id="detailImg" class="detail-img" src="" alt="" style="display:none">
      <div class="detail-meta" id="detailMeta"></div>
      <div class="memo-card-tags" id="detailTags"></div>
      <div class="detail-text" id="detailText" style="margin-top:12px;display:none"></div>
      <div class="detail-actions">
        <button class="btn btn-ghost" id="editMemoBtn">✏️ 編集</button>
        <button class="btn btn-ghost" id="shareBtn">📤 共有</button>
        <button class="btn btn-danger" id="deleteMemoBtn">🗑 削除</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>削除しますか？</h3>
    <p>このメモを削除します。元に戻せません。</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" id="confirmCancel">キャンセル</button>
      <button class="btn btn-danger" id="confirmOk">削除する</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden inputs -->
<input type="file" id="cameraInput" accept="image/*" capture="environment">
<input type="file" id="galleryInput" accept="image/*">

<script>
// ── Storage helpers ──
const DB_KEY = 'sukusho_memos';
let memos = JSON.parse(localStorage.getItem(DB_KEY) || '[]');

function save() {
  localStorage.setItem(DB_KEY, JSON.stringify(memos));
}

// ── State ──
let currentTags = [];
let editingId = null;
let currentDetailId = null;
let activeTagFilter = 'all';
let currentImageData = null;

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Modal ──
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// ── Date format ──
function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Render grid ──
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('memoGrid');

  let filtered = memos.filter(m => {
    const matchTag = activeTagFilter === 'all' || (m.tags || []).includes(activeTagFilter);
    const matchQ = !q || (m.title||'').toLowerCase().includes(q) || (m.text||'').toLowerCase().includes(q) || (m.tags||[]).some(t=>t.toLowerCase().includes(q));
    return matchTag && matchQ;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">📷</div>
      <h3>${memos.length === 0 ? '最初のメモを作ろう' : '該当するメモがありません'}</h3>
      <p>${memos.length === 0 ? '右下の＋ボタンから\n画像やメモを追加できます' : '検索条件を変えてみてください'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(m => `
    <div class="memo-card" data-id="${m.id}">
      ${m.image
        ? `<img src="${m.image}" alt="" loading="lazy">`
        : `<div class="memo-card-no-img"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>`
      }
      <div class="memo-card-body">
        <div class="memo-card-title">${m.title || (m.text ? m.text.split('\n')[0] : '（タイトルなし）')}</div>
        <div class="memo-card-date">${fmtDate(m.createdAt)}</div>
        ${m.tags?.length ? `<div class="memo-card-tags">${m.tags.map(t=>`<span class="tag-badge">${t}</span>`).join('')}</div>` : ''}
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.memo-card').forEach(card => {
    card.addEventListener('click', () => openDetail(card.dataset.id));
  });
}

// ── Tag filter bar ──
function renderTagFilter() {
  const allTags = [...new Set(memos.flatMap(m => m.tags || []))];
  const bar = document.getElementById('tagFilter');
  bar.innerHTML = `<div class="tag-chip ${activeTagFilter==='all'?'active':''}" data-tag="all">すべて</div>` +
    allTags.map(t => `<div class="tag-chip ${activeTagFilter===t?'active':''}" data-tag="${t}">${t}</div>`).join('');
  bar.querySelectorAll('.tag-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeTagFilter = chip.dataset.tag;
      renderTagFilter();
      render();
    });
  });
}

// ── Add modal ──
function resetAddForm() {
  document.getElementById('memoTitle').value = '';
  document.getElementById('memoText').value = '';
  document.getElementById('tagInput').value = '';
  document.getElementById('tagsList').innerHTML = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('previewImg').src = '';
  currentTags = [];
  currentImageData = null;
  editingId = null;
  document.getElementById('addModalTitle').textContent = '新しいメモ';
}

document.getElementById('addBtn').addEventListener('click', () => {
  resetAddForm();
  openModal('addModal');
});
document.getElementById('addModalClose').addEventListener('click', () => closeModal('addModal'));

// ── Image handling ──
function handleImageFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentImageData = e.target.result;
    document.getElementById('previewImg').src = currentImageData;
    document.getElementById('previewWrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

document.getElementById('cameraBtn').addEventListener('click', () => document.getElementById('cameraInput').click());
document.getElementById('galleryBtn').addEventListener('click', () => document.getElementById('galleryInput').click());
document.getElementById('cameraInput').addEventListener('change', e => handleImageFile(e.target.files[0]));
document.getElementById('galleryInput').addEventListener('change', e => handleImageFile(e.target.files[0]));
document.getElementById('removeImg').addEventListener('click', () => {
  currentImageData = null;
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('cameraInput').value = '';
  document.getElementById('galleryInput').value = '';
});

// ── Tag management ──
function addTag(tag) {
  tag = tag.trim();
  if (!tag || currentTags.includes(tag)) return;
  currentTags.push(tag);
  renderCurrentTags();
}
function renderCurrentTags() {
  document.getElementById('tagsList').innerHTML = currentTags.map(t =>
    `<span class="tag-item">${t}<button data-tag="${t}">×</button></span>`
  ).join('');
  document.querySelectorAll('.tag-item button').forEach(b => {
    b.addEventListener('click', () => {
      currentTags = currentTags.filter(t => t !== b.dataset.tag);
      renderCurrentTags();
    });
  });
}
document.getElementById('tagAddBtn').addEventListener('click', () => {
  addTag(document.getElementById('tagInput').value);
  document.getElementById('tagInput').value = '';
});
document.getElementById('tagInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addTag(e.target.value); e.target.value = ''; }
});

// ── Save memo ──
document.getElementById('saveMemoBtn').addEventListener('click', () => {
  const title = document.getElementById('memoTitle').value.trim();
  const text = document.getElementById('memoText').value.trim();
  if (!currentImageData && !text && !title) {
    showToast('⚠️ 画像かメモを入力してください');
    return;
  }
  if (editingId) {
    const idx = memos.findIndex(m => m.id === editingId);
    if (idx !== -1) {
      memos[idx] = { ...memos[idx], title, text, tags: [...currentTags], image: currentImageData, updatedAt: Date.now() };
    }
    showToast('✅ 更新しました');
  } else {
    memos.unshift({ id: Date.now().toString(), title, text, tags: [...currentTags], image: currentImageData, createdAt: Date.now() });
    showToast('✅ 保存しました');
  }
  save();
  renderTagFilter();
  render();
  closeModal('addModal');
});

// ── Detail ──
function openDetail(id) {
  const m = memos.find(m => m.id === id);
  if (!m) return;
  currentDetailId = id;
  document.getElementById('detailTitle').textContent = m.title || '（タイトルなし）';
  const img = document.getElementById('detailImg');
  if (m.image) { img.src = m.image; img.style.display = 'block'; }
  else img.style.display = 'none';
  document.getElementById('detailMeta').textContent = `📅 ${fmtDate(m.createdAt)}${m.updatedAt ? '  ✏️ 更新: ' + fmtDate(m.updatedAt) : ''}`;
  const tagsEl = document.getElementById('detailTags');
  tagsEl.innerHTML = (m.tags||[]).map(t=>`<span class="tag-badge">${t}</span>`).join('');
  const textEl = document.getElementById('detailText');
  if (m.text) { textEl.textContent = m.text; textEl.style.display = 'block'; }
  else textEl.style.display = 'none';
  openModal('detailModal');
}

document.getElementById('detailClose').addEventListener('click', () => closeModal('detailModal'));

document.getElementById('editMemoBtn').addEventListener('click', () => {
  const m = memos.find(m => m.id === currentDetailId);
  if (!m) return;
  closeModal('detailModal');
  resetAddForm();
  editingId = m.id;
  document.getElementById('addModalTitle').textContent = 'メモを編集';
  document.getElementById('memoTitle').value = m.title || '';
  document.getElementById('memoText').value = m.text || '';
  currentTags = [...(m.tags||[])];
  renderCurrentTags();
  if (m.image) {
    currentImageData = m.image;
    document.getElementById('previewImg').src = m.image;
    document.getElementById('previewWrap').style.display = 'block';
  }
  openModal('addModal');
});

// ── Share ──
document.getElementById('shareBtn').addEventListener('click', async () => {
  const m = memos.find(m => m.id === currentDetailId);
  if (!m) return;
  const text = [m.title, m.text, m.tags?.length ? '#' + m.tags.join(' #') : ''].filter(Boolean).join('\n');
  if (navigator.share) {
    const shareData = { title: m.title || 'スクショメモ', text };
    if (m.image) {
      try {
        const res = await fetch(m.image);
        const blob = await res.blob();
        const file = new File([blob], 'memo.jpg', { type: blob.type });
        shareData.files = [file];
      } catch(_) {}
    }
    try { await navigator.share(shareData); } catch(_) {}
  } else {
    navigator.clipboard?.writeText(text);
    showToast('📋 クリップボードにコピーしました');
  }
});

// ── Delete ──
let confirmResolve = null;
function showConfirm() {
  return new Promise(resolve => {
    confirmResolve = resolve;
    document.getElementById('confirmOverlay').classList.add('open');
  });
}
document.getElementById('confirmCancel').addEventListener('click', () => {
  document.getElementById('confirmOverlay').classList.remove('open');
  if (confirmResolve) confirmResolve(false);
});
document.getElementById('confirmOk').addEventListener('click', () => {
  document.getElementById('confirmOverlay').classList.remove('open');
  if (confirmResolve) confirmResolve(true);
});

document.getElementById('deleteMemoBtn').addEventListener('click', async () => {
  const ok = await showConfirm();
  if (!ok) return;
  memos = memos.filter(m => m.id !== currentDetailId);
  save();
  renderTagFilter();
  render();
  closeModal('detailModal');
  showToast('🗑 削除しました');
});

// ── Search ──
document.getElementById('searchInput').addEventListener('input', render);

// ── Close modal on overlay click ──
['addModal', 'detailModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal(id);
  });
});

// ── Sort ──
let sortAsc = false;
document.getElementById('sortBtn').addEventListener('click', () => {
  sortAsc = !sortAsc;
  memos.sort((a,b) => sortAsc ? a.createdAt - b.createdAt : b.createdAt - a.createdAt);
  render();
  showToast(sortAsc ? '⬆️ 古い順' : '⬇️ 新しい順');
});

// ── Init ──
renderTagFilter();
render();

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
